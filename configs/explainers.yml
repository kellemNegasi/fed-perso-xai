templates:
  tabular_explainer: &tabular_explainer
    supported_data_types:
      - tabular

shap:
  <<: *tabular_explainer
  type: shap
  description: "Tree/Kernel SHAP with client-local background data."
  params:
    experiment:
      logging:
        level: WARNING
        library_level: WARNING
      explanation:
        max_instances: 100
        method_max_instances: 200
        sampling_strategy: random
        random_state: 42
        background_data_source: client_local_train
        background_sample_size: 100
        shap_explainer_type: kernel
        shap_nsamples: 100
        shap_l1_reg: auto

causal_shap:
  <<: *tabular_explainer
  type: causal_shap
  description: "Causal SHAP with correlation threshold, client-local background data, and small-sample graph warnings."
  params:
    experiment:
      explanation:
        max_instances: 100
        method_max_instances: 200
        sampling_strategy: random
        random_state: 42
        background_data_source: client_local_train
        background_sample_size: 100
        causal_shap_corr_threshold: 0.3
        causal_shap_coalitions: 20
        causal_shap_min_graph_samples_warning: 10

integrated_gradients:
  <<: *tabular_explainer
  type: integrated_gradients
  description: "Finite-difference IG with client-local mean baseline."
  params:
    experiment:
      explanation:
        max_instances: 100
        method_max_instances: 200
        sampling_strategy: random
        random_state: 42
        background_data_source: client_local_train
        ig_steps: 40
        ig_epsilon: 1e-6
        ig_target_class: 1
        ig_allow_nondifferentiable: false
